name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GRAPH_TENANT_ID: op://Majans Dev/Graph MCP Agent/tenant_id
          GRAPH_CLIENT_ID: op://Majans Dev/Graph MCP Agent/client_id
          GRAPH_CLIENT_SECRET: op://Majans Dev/Graph MCP Agent/client_secret
          GRAPH_API_KEY: op://Majans Dev/Graph MCP API Key/credential

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push to ACR
        run: |
          az acr build --registry acrmajansagents \
            --image connector-graph:${{ github.sha }} .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name connector-graph \
            --resource-group rg-majans-agents \
            --image acrmajansagents.azurecr.io/connector-graph:${{ github.sha }} \
            --set-env-vars \
              GRAPH_TENANT_ID="$GRAPH_TENANT_ID" \
              GRAPH_CLIENT_ID="$GRAPH_CLIENT_ID" \
              GRAPH_CLIENT_SECRET="$GRAPH_CLIENT_SECRET" \
              GRAPH_API_KEY="$GRAPH_API_KEY" \
              PORT=8030

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify revision is ready
        run: |
          for i in $(seq 1 12); do
            LATEST=$(az containerapp revision list \
              --name connector-graph --resource-group rg-majans-agents \
              --query "sort_by([?properties.active], &properties.createdTime) | [-1].{prov:properties.provisioningState, run:properties.runningState}" \
              -o json 2>/dev/null) || LATEST="{}"
            PROV=$(echo "$LATEST" | jq -r '.prov // "unknown"')
            RUN=$(echo "$LATEST" | jq -r '.run // "unknown"')
            echo "[$(( i * 10 ))s] Provisioning: $PROV, Running: $RUN"
            if [[ "$PROV" == "Provisioned" ]]; then break; fi
            sleep 10
          done
          [[ "$PROV" == "Provisioned" ]] || { echo "::error::Revision not ready"; exit 1; }

      - name: Health check
        run: |
          HTTP_CODE=$(curl -s -o /tmp/h.json -w '%{http_code}' --retry 3 --retry-delay 10 --max-time 30 https://graph.majans.com/health)
          echo "HTTP: $HTTP_CODE, Body: $(cat /tmp/h.json)"
          [[ "$HTTP_CODE" =~ ^2 ]] || { echo "::error::Health check failed: HTTP $HTTP_CODE"; exit 1; }
